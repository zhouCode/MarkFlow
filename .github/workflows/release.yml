name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --publish never

      - name: Normalize Windows updater asset names
        if: runner.os == 'Windows'
        shell: bash
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const yaml=require('yaml'); const outDir='dist_electron'; const latestPath=path.join(outDir,'latest.yml'); const latest=yaml.parse(fs.readFileSync(latestPath,'utf8')); const expected=latest.path || latest.files?.[0]?.url; if (!expected) throw new Error('latest.yml is missing the Windows installer path'); const installers=fs.readdirSync(outDir).filter((name)=>name.endsWith('.exe') && !name.endsWith('.blockmap')); if (installers.length !== 1) throw new Error('Expected exactly one Windows installer, found: ' + installers.join(', ')); const actual=installers[0]; if (actual !== expected) { fs.renameSync(path.join(outDir, actual), path.join(outDir, expected)); const actualBlockmap=path.join(outDir, actual + '.blockmap'); const expectedBlockmap=path.join(outDir, expected + '.blockmap'); if (fs.existsSync(actualBlockmap) && actualBlockmap !== expectedBlockmap) fs.renameSync(actualBlockmap, expectedBlockmap); } if (!fs.existsSync(path.join(outDir, expected))) throw new Error('Expected installer not found after normalization: ' + expected); console.log('Windows updater installer:', expected);"

      - uses: actions/upload-artifact@v4
        with:
          name: markflow-${{ matrix.os }}
          if-no-files-found: error
          path: |
            dist_electron/*.zip
            dist_electron/*.exe
            dist_electron/latest*.yml
            dist_electron/*.blockmap

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ github.ref_name }}" -y || true

      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/latest*.yml
            artifacts/**/*.blockmap
